version: "3.9"

x-workspace: &workspace
  volumes:
    - .:/workspace
    - jigsaw-pip-cache:/root/.cache/pip

services:

  shell:
    build: .
    <<: *workspace
    stdin_open: true
    tty: true
    command: /bin/bash
    environment:
      - PYTHONPATH=/workspace
      - PYTHONUNBUFFERED=1

  tensorboard:
    build: .
    <<: *workspace
    command: tensorboard --logdir /workspace/tb_logs --host 0.0.0.0 --port 6006
    ports:
      - "6006:6006"
    environment:
      - PYTHONPATH=/workspace

  jupyter:
    build: .
    <<: *workspace
    command: >
      jupyter lab
        --ip=0.0.0.0
        --port=8888
        --no-browser
        --allow-root
        --NotebookApp.token=''
        --NotebookApp.password=''
        --notebook-dir=/workspace
    ports:
      - "8888:8888"
    environment:
      - PYTHONPATH=/workspace

volumes:
  jigsaw-pip-cache:
